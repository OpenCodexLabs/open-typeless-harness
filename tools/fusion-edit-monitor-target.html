<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Fusion Edit Monitor Target</title>
    <style>
      :root {
        color-scheme: light;
        font-family: ui-sans-serif, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
        background: #f4efe7;
        color: #1f2933;
      }

      body {
        margin: 0;
        min-height: 100vh;
        display: grid;
        place-items: center;
      }

      main {
        width: min(920px, calc(100vw - 48px));
        background: #fffaf2;
        border: 1px solid #dfd1bd;
        border-radius: 24px;
        box-shadow: 0 24px 80px rgba(80, 58, 28, 0.16);
        padding: 32px;
      }

      h1 {
        margin: 0 0 8px;
        font-size: 28px;
      }

      p {
        margin: 0 0 24px;
        color: #5d6b78;
        line-height: 1.5;
      }

      label {
        display: block;
        margin: 18px 0 8px;
        font-weight: 700;
      }

      textarea,
      input,
      [contenteditable] {
        width: 100%;
        box-sizing: border-box;
        border: 1px solid #c9b99f;
        border-radius: 16px;
        background: white;
        color: #1f2933;
        font: inherit;
        font-size: 18px;
        line-height: 1.5;
        padding: 16px;
        outline: none;
      }

      textarea:focus,
      input:focus,
      [contenteditable]:focus {
        border-color: #a46a2a;
        box-shadow: 0 0 0 4px rgba(164, 106, 42, 0.16);
      }

      textarea {
        min-height: 180px;
        resize: vertical;
      }

      [contenteditable] {
        min-height: 120px;
      }
    </style>
  </head>
  <body>
    <main>
      <h1>Fusion Edit Monitor Target</h1>
      <p>
        Focus one field, use OpenLess voice input, then manually edit the inserted text within 30
        seconds. The fusion watcher should record a text_changed event.
      </p>

      <label for="textarea-target">Textarea target</label>
      <textarea id="textarea-target" autofocus></textarea>

      <label for="input-target">Single-line input target</label>
      <input id="input-target" />

      <label for="editable-target">Contenteditable target</label>
      <div id="editable-target" contenteditable="true"></div>
    </main>
  </body>
</html>
